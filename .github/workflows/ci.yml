name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system media dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libcairo2-dev \
            libpango1.0-dev \
            pkg-config

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "anthropic>=0.40.0" \
            "google-genai>=0.8.0" \
            "typer>=0.12.0" \
            "rich>=13.7.0" \
            "ffmpeg-python>=0.2.0" \
            "moviepy==1.0.3" \
            "manim>=0.20.0" \
            "imageio>=2.9.0" \
            "imageio-ffmpeg>=0.4.7" \
            "python-dotenv>=1.0.0" \
            "numpy>=1.24.0" \
            "yt-dlp>=2025.1.0" \
            "pytest>=8.0.0"
          python -m pip install -e . --no-deps

      - name: Run tests
        run: pytest -q

      - name: Compile tracked Python files
        shell: bash
        run: |
          while IFS= read -r file; do
            python -m py_compile "$file"
          done < <(git ls-files '*.py')

      - name: Check whitespace
        run: git diff --check
