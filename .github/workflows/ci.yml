name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.14"
          - os: windows-latest
            python: "3.12"
          - os: macos-latest
            python: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install Vex and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Compile tracked Python files
        shell: bash
        run: |
          while IFS= read -r file; do
            python -m py_compile "$file"
          done < <(git ls-files '*.py')

      - name: Check whitespace
        run: git diff --check

  package:
    name: Build and validate distributions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*.whl dist/*.tar.gz

      - name: Inspect package contents
        run: python scripts/release_checks.py --dist-dir dist --write-checksums

      - name: Upload distributions
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  wheel-smoke:
    name: Wheel smoke (${{ matrix.os }}, Python ${{ matrix.python }})
    needs: package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: windows-latest
            python: "3.14"
          - os: macos-latest
            python: "3.12"

    steps:
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ matrix.python }}

      - name: Download distributions
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: python-package-distributions
          path: dist

      - name: Install wheel with pipx without a source checkout
        shell: bash
        run: |
          python -m pip install --upgrade pip "pipx==1.14.0"
          python -m pipx install --backend pip dist/*.whl
          python -m pipx runpip vex-video show vex-video
          echo "$(python -m pipx environment --value PIPX_BIN_DIR)" >> "$GITHUB_PATH"

      - name: Verify installed CLI and resources
        shell: bash
        run: |
          vex --version
          vex --help
          vex setup config --path .vex-ci.env
          vex renderers doctor
          python -m pipx runpip vex-video show --files vex-video |
            python -c "import sys; files = sys.stdin.read().replace(chr(92), '/'); assert 'vex_runtime/resources/hyperframes/package-lock.json' in files"
