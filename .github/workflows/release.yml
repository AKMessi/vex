name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build, verify, and attest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.validate.outputs.version }}
      prerelease: ${{ steps.validate.outputs.prerelease }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install release tooling
        run: python -m pip install --upgrade build twine

      - name: Run release regression tests
        run: python -m pip install -e ".[dev]" && python -m pytest -q

      - name: Build distributions
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*.whl dist/*.tar.gz

      - name: Validate tag and artifact contents
        id: validate
        run: >-
          python scripts/release_checks.py
          --dist-dir dist
          --tag "${GITHUB_REF_NAME}"
          --write-checksums
          --github-output "${GITHUB_OUTPUT}"

      - name: Attest release distributions
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload verified distributions
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 30

  publish-testpypi:
    name: Publish release candidate to TestPyPI
    if: needs.build.outputs.prerelease == 'true'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/p/vex-video/${{ needs.build.outputs.version }}
    permissions:
      id-token: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: python-package-distributions
          path: dist

      - name: Prepare TestPyPI publish directory
        run: rm dist/SHA256SUMS

      - name: Upload distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/

  verify-testpypi:
    name: Verify TestPyPI installation
    if: needs.build.outputs.prerelease == 'true'
    needs: [build, publish-testpypi]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.11"

      - name: Install published release candidate
        run: |
          python -m pip install --upgrade pip "pipx==1.14.0"
          mkdir -p candidate
          for attempt in {1..10}; do
            if python -m pip download \
              --no-deps \
              --index-url https://test.pypi.org/simple/ \
              --dest candidate \
              "vex-video==${{ needs.build.outputs.version }}"; then
              break
            fi
            if [ "$attempt" -eq 10 ]; then
              exit 1
            fi
            sleep 15
          done
          python -m pipx install --backend pip candidate/*.whl
          python -m pipx runpip vex-video show vex-video
          echo "$(python -m pipx environment --value PIPX_BIN_DIR)" >> "$GITHUB_PATH"

      - name: Verify published release candidate
        run: |
          vex --version
          vex --help
          vex setup config --path .vex-release.env
          vex setup transcription --help
          vex renderers doctor
          python -m pipx runpip vex-video show --files vex-video |
            python -c "import sys; files = sys.stdin.read().replace(chr(92), '/'); required = ('visual_opportunity.py', 'visual_program.py', 'tools/auto_visuals.py', 'tools/creative_optimizer.py', 'tools/auto_shorts.py', 'shorts/story_compiler.py', 'vex_hyperframes/visual_world.py', 'vex_hyperframes/visual_world_renderer.py', 'vex_hyperframes/qa.py', 'vex_runtime/imaging.py'); missing = [path for path in required if path not in files]; assert not missing, f'missing installed files: {missing}'"
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          pipx_home = Path(
              subprocess.check_output(
                  [sys.executable, "-m", "pipx", "environment", "--value", "PIPX_HOME"],
                  text=True,
              ).strip()
          )
          candidates = (
              pipx_home / "venvs" / "vex-video" / "bin" / "python",
              pipx_home / "venvs" / "vex-video" / "Scripts" / "python.exe",
          )
          vex_python = next(path for path in candidates if path.is_file())
          subprocess.run(
              [
                  str(vex_python),
                  "-c",
                  "from vex_runtime.imaging import require_imaging_runtime; "
                  "print(require_imaging_runtime())",
              ],
              check=True,
          )
          PY

  release-candidate:
    name: Create GitHub prerelease
    if: needs.build.outputs.prerelease == 'true'
    needs: [build, verify-testpypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: python-package-distributions
          path: dist

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: true
          make_latest: false

  publish-pypi:
    name: Publish stable release to PyPI
    if: needs.build.outputs.prerelease == 'false'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/vex-video/${{ needs.build.outputs.version }}
    permissions:
      id-token: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: python-package-distributions
          path: dist

      - name: Prepare PyPI publish directory
        run: rm dist/SHA256SUMS

      - name: Upload distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/

  verify-pypi:
    name: Verify PyPI installation
    if: needs.build.outputs.prerelease == 'false'
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.11"

      - name: Install published stable release
        run: |
          python -m pip install --upgrade pip "pipx==1.14.0"
          for attempt in {1..10}; do
            if python -m pipx install --backend pip --force "vex-video==${{ needs.build.outputs.version }}"; then
              break
            fi
            if [ "$attempt" -eq 10 ]; then
              exit 1
            fi
            sleep 15
          done
          echo "$(python -m pipx environment --value PIPX_BIN_DIR)" >> "$GITHUB_PATH"

      - name: Verify published stable release
        run: |
          vex --version
          vex --help
          vex setup config --path .vex-release.env
          vex setup transcription --help
          vex renderers doctor
          python -m pipx runpip vex-video show --files vex-video |
            python -c "import sys; files = sys.stdin.read().replace(chr(92), '/'); required = ('visual_opportunity.py', 'visual_program.py', 'tools/auto_visuals.py', 'tools/creative_optimizer.py', 'tools/auto_shorts.py', 'shorts/story_compiler.py', 'vex_hyperframes/visual_world.py', 'vex_hyperframes/visual_world_renderer.py', 'vex_hyperframes/qa.py', 'vex_runtime/imaging.py'); missing = [path for path in required if path not in files]; assert not missing, f'missing installed files: {missing}'"
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          pipx_home = Path(
              subprocess.check_output(
                  [sys.executable, "-m", "pipx", "environment", "--value", "PIPX_HOME"],
                  text=True,
              ).strip()
          )
          candidates = (
              pipx_home / "venvs" / "vex-video" / "bin" / "python",
              pipx_home / "venvs" / "vex-video" / "Scripts" / "python.exe",
          )
          vex_python = next(path for path in candidates if path.is_file())
          subprocess.run(
              [
                  str(vex_python),
                  "-c",
                  "from vex_runtime.imaging import require_imaging_runtime; "
                  "print(require_imaging_runtime())",
              ],
              check=True,
          )
          PY

  release-stable:
    name: Create stable GitHub release
    if: needs.build.outputs.prerelease == 'false'
    needs: [build, verify-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: python-package-distributions
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: false
          make_latest: true
